server:
  port: 8084

spring:
  application:
    name: ms-comentarios
  datasource:
    url: jdbc:mysql://localhost:3306/foro_comentarios_db
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/