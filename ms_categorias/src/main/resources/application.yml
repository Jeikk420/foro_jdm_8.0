server:
  port: 8082 

spring:
  application:
    name: ms-categorias
  datasource:
    url: jdbc:mysql://localhost:3306/foro_categorias_db # Asegúrate de que esta BD exista en tu phpMyAdmin
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/